networks:
  project_net:
    driver: bridge
    ipam:
      config:
        - subnet: "10.0.0.0/16"
          gateway: "10.0.0.1"

services:
  redpanda-1:
    image: redpandadata/redpanda:v24.2.18
    container_name: "project_redpanda"
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '1'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://project_redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:28082,OUTSIDE://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://project_redpanda:28082,OUTSIDE://localhost:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - project_redpanda:33145
    ports:
      # - 8081:8081
      - 8082:8082
      - 9092:9092
      - 28082:28082
      - 29092:29092
    networks:
       project_net:
          ipv4_address: 10.0.0.10
  connect:
    image: debezium/connect:2.3
    container_name: "project_debezium"
    ports:
      - "8083:8083"
    environment:
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=connect_configs
      - OFFSET_STORAGE_TOPIC=connect_offsets
      - STATUS_STORAGE_TOPIC=connect_statuses
      - BOOTSTRAP_SERVERS=project_redpanda:29092
    volumes:
      - ./pg-source.json:/kafka/config/pg-source.json
      - ./src/curl_postgres_connector.sh:/opt/src
      - ./src/flows:/opt/src/flows
    networks:
      project_net:
          ipv4_address: 10.0.0.11
    depends_on:
      - redpanda-1

  jobmanager:
    build:
      context: .
      dockerfile: ./Dockerfile.flink
    image: pyflink:2.12
    container_name: "project_flink_jobmanager"
    pull_policy: never
    platform: "linux/amd64"
    hostname: "jobmanager"
    expose:
      - "6123"
    ports:
      - "8081:8081"
    networks:
      project_net:
          ipv4_address: 10.0.0.12
    volumes:
      - ./:/opt/flink/usrlib
      - ./keys/:/var/private/ssl/
      - ./src/:/opt/src
    command: jobmanager 
    extra_hosts:
      - "host.docker.internal:127.0.0.1" #// Linux
      - "host.docker.internal:host-gateway" #// Access services on the host machine from within the Docker container
    environment:
      #- POSTGRES_URL=${POSTGRES_URL:-jdbc:postgresql://host.docker.internal:5432/postgres}
      - POSTGRES_URL=${POSTGRES_URL:-jdbc:postgresql://10.0.0.14:5432/postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager        
  
  # Flink task manager
  taskmanager:
    image: pyflink:2.12
    container_name: "project_flink_taskmanager"
    pull_policy: never
    platform: "linux/amd64"
    expose:
      - "6121"
      - "6122"
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
    depends_on:
      - jobmanager
    command: taskmanager --taskmanager.registration.timeout 5 min 
    extra_hosts:
      - "host.docker.internal:127.0.0.1" #// Linux
      - "host.docker.internal:host-gateway" #// Access services on the host machine from within the Docker container
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 3
    networks:
      project_net:
          ipv4_address: 10.0.0.13

  postgres:
    image: postgres:14
    restart: on-failure
    container_name: "project_postgres"
    volumes:
      - ./src/postgresql.conf:/var/lib/postgresql/data/postgresql.conf
      - ./src/create_tables.sql:/opt/src/create_tables.sql
      - ./src/generate_data_postgres.py:/opt/src/generate_data_postgres.py
    environment:
      - POSTGRES_DB=hospital
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    networks:
      project_net:
          ipv4_address: 10.0.0.14
    extra_hosts:
     - "host.docker.internal:127.0.0.1" #// Linux
     - "host.docker.internal:host-gateway" #// Access services on the host machine from within the Docker container

  dbt:
    image: ghcr.io/dbt-labs/dbt-bigquery:latest
    container_name: "project_dbt_runner"
    volumes:
      - ./dbt:/usr/app/dbt
      - ./.dbt:/root/.dbt  # profiles.yml location
    ports:
      - "8087:8080"
    networks:
      project_net:
          ipv4_address: 10.0.0.15
    working_dir: /usr/app/dbt
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt
    entrypoint: [ "tail", "-f", "/dev/null" ]

